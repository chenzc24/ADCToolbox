name: Deploy Documentation to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'python/docs/**'
      - 'python/src/adctoolbox/**/*.py'
      - 'python/pyproject.toml'
      - 'python/uv.lock'
      - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

env:
  CF_PROJECT_NAME: adctoolbox
  CF_PRODUCTION_BRANCH: main
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://adctoolbox.tokenzhang.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install documentation dependencies
        run: |
          cd python
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build English docs
        run: |
          cd python/docs
          python -m sphinx -b html source build/html
          touch build/html/.nojekyll

      - name: Build Chinese docs
        run: |
          cd python/docs
          python -m sphinx -b html -D language=zh_CN source build/html/zh_CN

      - name: Skip Cloudflare deploy when secrets are missing
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Cloudflare deploy skipped."
          echo "Set GitHub repository secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to enable deployment."

      - name: Ensure Cloudflare Pages project exists
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          npx --yes wrangler@4 pages project create "$CF_PROJECT_NAME" \
            --production-branch="$CF_PRODUCTION_BRANCH" || true

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          npx --yes wrangler@4 pages deploy python/docs/build/html \
            --project-name="$CF_PROJECT_NAME" \
            --branch="$CF_PRODUCTION_BRANCH"
